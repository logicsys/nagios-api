# Test host group
define hostgroup {
    hostgroup_name  test-servers
    alias           Test Servers
    members         testhost1,testhost2
}

# Test host 1 - will be UP (pings localhost)
define host {
    use                 generic-host
    host_name           testhost1
    alias               Test Host 1
    address             127.0.0.1
    check_command       check-host-alive
    max_check_attempts  3
    check_interval      1
    retry_interval      1
    contact_groups      admins
    notification_interval 60
}

# Test host 2 - will also be UP (pings localhost)
define host {
    use                 generic-host
    host_name           testhost2
    alias               Test Host 2
    address             127.0.0.1
    check_command       check-host-alive
    max_check_attempts  3
    check_interval      1
    retry_interval      1
    contact_groups      admins
    notification_interval 60
}

# Services on testhost1
define service {
    use                 generic-service
    host_name           testhost1
    service_description TestService_OK
    check_command       return_ok
}

define service {
    use                 generic-service
    host_name           testhost1
    service_description TestService_WARN
    check_command       return_warning
}

define service {
    use                 generic-service
    host_name           testhost1
    service_description TestService_CRIT
    check_command       return_critical
}

# Services on testhost2
define service {
    use                 generic-service
    host_name           testhost2
    service_description TestService_OK
    check_command       return_ok
}

define service {
    use                 generic-service
    host_name           testhost2
    service_description Ping
    check_command       check_ping!3000.0,80%!5000.0,100%
}
